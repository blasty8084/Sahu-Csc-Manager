<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAHU CSC — You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b2c60;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 4rem;
      line-height: 1;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.95rem;
      color: #94afd4;
      max-width: 26rem;
      line-height: 1.6;
    }
    button {
      margin-top: 0.5rem;
      padding: 0.65rem 1.75rem;
      border: none;
      border-radius: 9999px;
      background: #f97316;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .brand {
      position: absolute;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #94afd4;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <span class="brand">SAHU CSC</span>
  <div class="icon">📶</div>
  <h1>You're offline</h1>
  <p>
    No internet connection detected. Any changes you make in the app will be
    queued and synced automatically when you're back online.
  </p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
