<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>SAHU CSC — Common Service Center</title>
    <meta name="description" content="SAHU CSC — Business management platform for Common Service Centers. Track ledger, services, reports and more." />
    <meta name="application-name" content="SAHU CSC" />
    <meta name="robots" content="index, follow" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0b2c60" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SAHU CSC" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="SAHU CSC — Common Service Center" />
    <meta property="og:description" content="Business management platform for Common Service Centers — ledger, services, reports & more." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SAHU CSC — Common Service Center" />
    <meta name="twitter:description" content="Business management platform for Common Service Centers — ledger, services, reports & more." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!-- Critical asset preloads -->
    <link rel="preload" as="image" href="/sahu-logo.png" fetchpriority="high">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <!-- Inline loading shown before React mounts — prevents blank white screen on mobile -->
      <div id="app-loading" style="
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        min-height:100svh; background:#0b2c60; gap:16px;
      ">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="
            width:40px;height:40px;border-radius:50%;background:#f97316;
            display:flex;align-items:center;justify-content:center;
            font-size:18px;font-weight:800;color:#fff;font-family:sans-serif;
          ">S</div>
          <div>
            <div style="color:#fff;font-weight:700;font-size:16px;font-family:sans-serif;line-height:1.2;">SAHU CSC</div>
            <div style="color:rgba(255,255,255,0.55);font-size:11px;font-family:sans-serif;">Management Platform</div>
          </div>
        </div>
        <div style="
          width:36px;height:36px;border-radius:50%;
          border:3px solid rgba(249,115,22,0.3);
          border-top-color:#f97316;
          animation:spin 0.8s linear infinite;
        "></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove inline loader once React mounts
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var loader = document.getElementById('app-loading');
          var root = document.getElementById('root');
          if (loader && root && root.children.length > 1) {
            loader.style.display = 'none';
            observer.disconnect();
          }
        });
        var root = document.getElementById('root');
        if (root) observer.observe(root, { childList: true, subtree: false });
      });
    </script>
  </body>
</html>
