<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>SAHU CSC — Common Service Center</title>
    <meta name="description" content="SAHU CSC — Business management platform for Common Service Centers. Track ledger, services, reports and more." />
    <meta name="application-name" content="SAHU CSC" />
    <meta name="robots" content="index, follow" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0b2c60" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SAHU CSC" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="SAHU CSC — Common Service Center" />
    <meta property="og:description" content="Business management platform for Common Service Centers — ledger, services, reports & more." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SAHU CSC — Common Service Center" />
    <meta name="twitter:description" content="Business management platform for Common Service Centers — ledger, services, reports & more." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!-- Critical asset preloads -->
    <link rel="preload" as="image" href="/sahu-logo.png" fetchpriority="high">

    <!-- Fonts — loaded non-blocking; display=swap means text is visible immediately in fallback font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"></noscript>

    <style>
      /* ── Skeleton loading screen ─────────────────────────────────── */
      *,*::before,*::after{box-sizing:border-box}
      #app-loading{
        position:fixed;inset:0;z-index:9999;
        background:#f8f9fa;
        opacity:1;
        transition:opacity 0.25s ease;
      }
      #app-loading.sk-fade{opacity:0;pointer-events:none}

      /* Shimmer block */
      .sk{
        border-radius:8px;
        background:linear-gradient(90deg,#e8eaed 25%,#f4f5f7 50%,#e8eaed 75%);
        background-size:400% 100%;
        animation:sk-wave 1.5s ease-in-out infinite;
      }
      @keyframes sk-wave{
        0%{background-position:100% 0}
        100%{background-position:-100% 0}
      }

      /* ── MOBILE (default) ───────────────────────────────────────── */
      .sk-mob{display:flex;flex-direction:column;height:100%}
      .sk-desk{display:none}

      /* Navy top header */
      .sk-hdr{
        height:56px;background:#0b2c60;
        display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;
      }
      .sk-hdr-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);flex-shrink:0}
      .sk-hdr-t{display:flex;flex-direction:column;gap:5px;flex:1}
      .sk-hdr-t .sk{background:linear-gradient(90deg,rgba(255,255,255,.18) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.18) 75%);background-size:400% 100%}
      .sk-hdr-ic{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.1)}

      /* Content area */
      .sk-body{flex:1;overflow:hidden;padding:16px;padding-bottom:80px;display:flex;flex-direction:column;gap:16px}

      /* Greeting */
      .sk-greet{display:flex;flex-direction:column;gap:7px}

      /* 2×2 stat cards */
      .sk-cards2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      .sk-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:8px}

      /* Quick actions row */
      .sk-qa{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
      .sk-qa-item{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:14px 4px;display:flex;flex-direction:column;align-items:center;gap:8px}

      /* List rows */
      .sk-list{display:flex;flex-direction:column;gap:8px}

      /* Bottom nav */
      .sk-nav{
        position:fixed;bottom:0;left:0;right:0;height:64px;
        background:#fff;border-top:1px solid #e5e7eb;
        display:flex;align-items:center;padding:0 16px;z-index:10;
      }
      .sk-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}

      /* ── DESKTOP (≥768px) ───────────────────────────────────────── */
      @media(min-width:768px){
        .sk-mob{display:none}
        .sk-desk{display:flex;height:100%}

        /* Navy sidebar */
        .sk-sb{
          width:256px;flex-shrink:0;background:#0b2c60;
          display:flex;flex-direction:column;padding:16px;gap:12px;
        }
        .sk-sb-logo{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.1)}
        .sk-sb-av{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);flex-shrink:0}
        .sk-sb-rows{display:flex;flex-direction:column;gap:4px;flex:1}
        .sk-sb-row{
          height:40px;border-radius:10px;background:rgba(255,255,255,.05);
          display:flex;align-items:center;padding:0 12px;gap:10px;
        }
        .sk-sb .sk{background:linear-gradient(90deg,rgba(255,255,255,.18) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.18) 75%);background-size:400% 100%}

        /* Main content */
        .sk-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .sk-topbar{
          height:64px;border-bottom:1px solid #e5e7eb;background:#fff;
          display:flex;align-items:center;justify-content:space-between;padding:0 32px;flex-shrink:0;
        }
        .sk-content{padding:32px;display:flex;flex-direction:column;gap:20px;overflow:hidden}
        .sk-cards4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
        .sk-bigcard{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px}
        .sk-row2{display:grid;grid-template-columns:2fr 1fr;gap:16px}
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading" aria-hidden="true">

        <!-- ── MOBILE skeleton ───────────────────────────────────── -->
        <div class="sk-mob">
          <div class="sk-hdr">
            <div class="sk-hdr-av"></div>
            <div class="sk-hdr-t">
              <div class="sk" style="height:10px;width:80px;border-radius:99px"></div>
              <div class="sk" style="height:8px;width:110px;border-radius:99px"></div>
            </div>
            <div class="sk-hdr-ic"></div>
          </div>

          <div class="sk-body">
            <!-- Greeting -->
            <div class="sk-greet">
              <div class="sk" style="height:10px;width:130px;border-radius:99px"></div>
              <div class="sk" style="height:18px;width:200px;border-radius:99px"></div>
            </div>

            <!-- 2×2 stat cards -->
            <div class="sk-cards2">
              <div class="sk-card">
                <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                <div class="sk" style="height:9px;width:52px;border-radius:99px"></div>
                <div class="sk" style="height:20px;width:80px;border-radius:99px"></div>
                <div class="sk" style="height:8px;width:96px;border-radius:99px"></div>
              </div>
              <div class="sk-card">
                <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                <div class="sk" style="height:9px;width:64px;border-radius:99px"></div>
                <div class="sk" style="height:20px;width:72px;border-radius:99px"></div>
                <div class="sk" style="height:8px;width:88px;border-radius:99px"></div>
              </div>
              <div class="sk-card">
                <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                <div class="sk" style="height:9px;width:72px;border-radius:99px"></div>
                <div class="sk" style="height:20px;width:80px;border-radius:99px"></div>
                <div class="sk" style="height:8px;width:100px;border-radius:99px"></div>
              </div>
              <div class="sk-card">
                <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                <div class="sk" style="height:9px;width:60px;border-radius:99px"></div>
                <div class="sk" style="height:20px;width:44px;border-radius:99px"></div>
                <div class="sk" style="height:8px;width:80px;border-radius:99px"></div>
              </div>
            </div>

            <!-- Quick actions -->
            <div>
              <div class="sk" style="height:9px;width:96px;border-radius:99px;margin-bottom:10px"></div>
              <div class="sk-qa">
                <div class="sk-qa-item">
                  <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                  <div class="sk" style="height:8px;width:40px;border-radius:99px"></div>
                </div>
                <div class="sk-qa-item">
                  <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                  <div class="sk" style="height:8px;width:32px;border-radius:99px"></div>
                </div>
                <div class="sk-qa-item">
                  <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                  <div class="sk" style="height:8px;width:48px;border-radius:99px"></div>
                </div>
                <div class="sk-qa-item">
                  <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                  <div class="sk" style="height:8px;width:44px;border-radius:99px"></div>
                </div>
              </div>
            </div>

            <!-- List rows -->
            <div>
              <div class="sk" style="height:9px;width:120px;border-radius:99px;margin-bottom:10px"></div>
              <div class="sk-list">
                <div class="sk" style="height:52px;border-radius:14px"></div>
                <div class="sk" style="height:52px;border-radius:14px"></div>
                <div class="sk" style="height:52px;border-radius:14px"></div>
                <div class="sk" style="height:52px;border-radius:14px"></div>
              </div>
            </div>
          </div>

          <!-- Bottom nav -->
          <div class="sk-nav">
            <div class="sk-nav-item">
              <div class="sk" style="height:20px;width:20px;border-radius:4px"></div>
              <div class="sk" style="height:8px;width:36px;border-radius:99px"></div>
            </div>
            <div class="sk-nav-item">
              <div class="sk" style="height:20px;width:20px;border-radius:4px"></div>
              <div class="sk" style="height:8px;width:28px;border-radius:99px"></div>
            </div>
            <div class="sk-nav-item">
              <div class="sk" style="height:20px;width:20px;border-radius:4px"></div>
              <div class="sk" style="height:8px;width:32px;border-radius:99px"></div>
            </div>
            <div class="sk-nav-item">
              <div class="sk" style="height:20px;width:20px;border-radius:4px"></div>
              <div class="sk" style="height:8px;width:40px;border-radius:99px"></div>
            </div>
          </div>
        </div>

        <!-- ── DESKTOP skeleton ──────────────────────────────────── -->
        <div class="sk-desk">
          <!-- Sidebar -->
          <div class="sk-sb">
            <div class="sk-sb-logo">
              <div class="sk-sb-av"></div>
              <div style="display:flex;flex-direction:column;gap:6px;flex:1">
                <div class="sk" style="height:11px;width:80px;border-radius:99px"></div>
                <div class="sk" style="height:9px;width:110px;border-radius:99px"></div>
              </div>
            </div>
            <div class="sk-sb-rows">
              <div class="sk-sb-row"><div class="sk" style="height:14px;width:14px;border-radius:3px;flex-shrink:0"></div><div class="sk" style="height:9px;width:70px;border-radius:99px"></div></div>
              <div class="sk-sb-row"><div class="sk" style="height:14px;width:14px;border-radius:3px;flex-shrink:0"></div><div class="sk" style="height:9px;width:50px;border-radius:99px"></div></div>
              <div class="sk-sb-row"><div class="sk" style="height:14px;width:14px;border-radius:3px;flex-shrink:0"></div><div class="sk" style="height:9px;width:88px;border-radius:99px"></div></div>
              <div class="sk-sb-row"><div class="sk" style="height:14px;width:14px;border-radius:3px;flex-shrink:0"></div><div class="sk" style="height:9px;width:60px;border-radius:99px"></div></div>
              <div class="sk-sb-row"><div class="sk" style="height:14px;width:14px;border-radius:3px;flex-shrink:0"></div><div class="sk" style="height:9px;width:76px;border-radius:99px"></div></div>
              <div class="sk-sb-row"><div class="sk" style="height:14px;width:14px;border-radius:3px;flex-shrink:0"></div><div class="sk" style="height:9px;width:64px;border-radius:99px"></div></div>
              <div class="sk-sb-row"><div class="sk" style="height:14px;width:14px;border-radius:3px;flex-shrink:0"></div><div class="sk" style="height:9px;width:80px;border-radius:99px"></div></div>
              <div class="sk-sb-row"><div class="sk" style="height:14px;width:14px;border-radius:3px;flex-shrink:0"></div><div class="sk" style="height:9px;width:56px;border-radius:99px"></div></div>
            </div>
            <div class="sk" style="height:52px;border-radius:14px;background:rgba(255,255,255,.08)"></div>
          </div>

          <!-- Main area -->
          <div class="sk-main">
            <div class="sk-topbar">
              <div style="display:flex;flex-direction:column;gap:6px">
                <div class="sk" style="height:16px;width:110px;border-radius:99px"></div>
                <div class="sk" style="height:10px;width:160px;border-radius:99px"></div>
              </div>
              <div style="display:flex;align-items:center;gap:12px">
                <div class="sk" style="height:32px;width:120px;border-radius:8px"></div>
                <div class="sk" style="height:32px;width:32px;border-radius:50%"></div>
              </div>
            </div>
            <div class="sk-content">
              <div class="sk-cards4">
                <div class="sk-bigcard">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div class="sk" style="height:9px;width:64px;border-radius:99px"></div>
                    <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                  </div>
                  <div class="sk" style="height:28px;width:120px;border-radius:99px"></div>
                  <div class="sk" style="height:9px;width:88px;border-radius:99px"></div>
                </div>
                <div class="sk-bigcard">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div class="sk" style="height:9px;width:72px;border-radius:99px"></div>
                    <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                  </div>
                  <div class="sk" style="height:28px;width:100px;border-radius:99px"></div>
                  <div class="sk" style="height:9px;width:96px;border-radius:99px"></div>
                </div>
                <div class="sk-bigcard">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div class="sk" style="height:9px;width:80px;border-radius:99px"></div>
                    <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                  </div>
                  <div class="sk" style="height:28px;width:110px;border-radius:99px"></div>
                  <div class="sk" style="height:9px;width:80px;border-radius:99px"></div>
                </div>
                <div class="sk-bigcard">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div class="sk" style="height:9px;width:56px;border-radius:99px"></div>
                    <div class="sk" style="height:36px;width:36px;border-radius:10px"></div>
                  </div>
                  <div class="sk" style="height:28px;width:60px;border-radius:99px"></div>
                  <div class="sk" style="height:9px;width:104px;border-radius:99px"></div>
                </div>
              </div>
              <div class="sk-row2">
                <div class="sk-bigcard">
                  <div class="sk" style="height:12px;width:120px;border-radius:99px"></div>
                  <div class="sk" style="height:144px;border-radius:12px"></div>
                </div>
                <div class="sk-bigcard">
                  <div class="sk" style="height:12px;width:96px;border-radius:99px"></div>
                  <div style="display:flex;flex-direction:column;gap:8px">
                    <div class="sk" style="height:44px;border-radius:12px"></div>
                    <div class="sk" style="height:44px;border-radius:12px"></div>
                    <div class="sk" style="height:44px;border-radius:12px"></div>
                    <div class="sk" style="height:44px;border-radius:12px"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Fade out the skeleton once React has mounted
      (function() {
        var observer = new MutationObserver(function() {
          var loader = document.getElementById('app-loading');
          var root = document.getElementById('root');
          if (loader && root && root.children.length > 1) {
            loader.classList.add('sk-fade');
            setTimeout(function() { loader.style.display = 'none'; }, 260);
            observer.disconnect();
          }
        });
        var root = document.getElementById('root');
        if (root) observer.observe(root, { childList: true });
      })();
    </script>
  </body>
</html>
