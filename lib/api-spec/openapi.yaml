openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SAHU CSC FV1 - CSC Business Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: profile
    description: User profile management
  - name: preferences
    description: User preferences management
  - name: ledger
    description: Ledger and financial operations
  - name: services
    description: CSC service management
  - name: users
    description: User management
  - name: reports
    description: Reporting and analytics
  - name: notifications
    description: Notification management
  - name: audit
    description: Audit log operations
  - name: settings
    description: System settings
  - name: backups
    description: Backup and restore operations
  - name: dashboard
    description: Dashboard summary data
  - name: udhari
    description: Udhari Khata - Customer Credit Ledger

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:

    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  # Profile
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /profile/avatar:
    post:
      operationId: uploadAvatar
      tags: [profile]
      summary: Upload or replace profile picture (base64 data URL)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarInput"
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"
    delete:
      operationId: deleteAvatar
      tags: [profile]
      summary: Remove profile picture
      responses:
        "200":
          description: Avatar removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Preferences
  /preferences:
    get:
      operationId: getPreferences
      tags: [preferences]
      summary: Get current user preferences
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
    patch:
      operationId: updatePreferences
      tags: [preferences]
      summary: Update current user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreferencesInput"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"

  # Ledger
  /ledger:
    get:
      operationId: listLedgerEntries
      tags: [ledger]
      summary: List ledger entries
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: serviceType
          in: query
          schema:
            type: string
        - name: customerName
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerListResponse"
    post:
      operationId: createLedgerEntry
      tags: [ledger]
      summary: Create ledger entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LedgerEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"

  /ledger/balance:
    get:
      operationId: getBalance
      tags: [ledger]
      summary: Get current running balance
      responses:
        "200":
          description: Current balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"

  /ledger/summary:
    get:
      operationId: getLedgerSummary
      tags: [ledger]
      summary: Get ledger summary stats
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, yesterday, week, month, custom]
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerSummary"

  /ledger/{id}:
    get:
      operationId: getLedgerEntry
      tags: [ledger]
      summary: Get ledger entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ledger entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"
        "404":
          description: Not found
    patch:
      operationId: updateLedgerEntry
      tags: [ledger]
      summary: Update ledger entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LedgerEntryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"
        "404":
          description: Not found
    delete:
      operationId: deleteLedgerEntry
      tags: [ledger]
      summary: Delete ledger entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # Services
  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List CSC services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a CSC service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a CSC service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a CSC service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # Reports
  /reports/daily:
    get:
      operationId: getDailyReport
      tags: [reports]
      summary: Get daily report
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /reports/monthly:
    get:
      operationId: getMonthlyReport
      tags: [reports]
      summary: Get monthly report
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Monthly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"

  /reports/service-breakdown:
    get:
      operationId: getServiceBreakdown
      tags: [reports]
      summary: Get revenue breakdown by service type
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Service breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceBreakdown"

  /reports/export:
    get:
      operationId: exportReport
      tags: [reports]
      summary: Export report to Excel
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [daily, monthly, custom]
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  # Notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "404":
          description: Not found

  /notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # Audit Logs
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  # Settings
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get system settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update system settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  # Backups
  /backups:
    get:
      operationId: listBackups
      tags: [backups]
      summary: List backups
      responses:
        "200":
          description: List of backups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Backup"
    post:
      operationId: createBackup
      tags: [backups]
      summary: Create a backup
      responses:
        "201":
          description: Backup created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backup"

  /backups/{id}/restore:
    post:
      operationId: restoreBackup
      tags: [backups]
      summary: Restore from backup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restore successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found

  # Dashboard
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # Udhari Khata
  /udhari/summary:
    get:
      operationId: getUdhariSummary
      tags: [udhari]
      summary: Get Udhari Khata summary totals
      responses:
        "200":
          description: Summary totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UdhariSummary"

  /udhari/customers:
    get:
      operationId: listUdhariCustomers
      tags: [udhari]
      summary: List all customers
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search by name or mobile
        - in: query
          name: sort
          schema:
            type: string
            enum: [recent, balance_desc, alpha]
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UdhariCustomer"
    post:
      operationId: createUdhariCustomer
      tags: [udhari]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UdhariCustomerInput"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UdhariCustomer"

  /udhari/customers/{customerId}:
    get:
      operationId: getUdhariCustomer
      tags: [udhari]
      summary: Get a single customer
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UdhariCustomer"
    patch:
      operationId: updateUdhariCustomer
      tags: [udhari]
      summary: Update a customer
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UdhariCustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UdhariCustomer"
    delete:
      operationId: deleteUdhariCustomer
      tags: [udhari]
      summary: Delete a customer
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /udhari/customers/{customerId}/entries:
    get:
      operationId: listUdhariEntries
      tags: [udhari]
      summary: List entries for a customer
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UdhariEntry"
    post:
      operationId: createUdhariEntry
      tags: [udhari]
      summary: Add an entry for a customer
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UdhariEntryInput"
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UdhariEntryResponse"

  /udhari/customers/{customerId}/entries/{entryId}:
    patch:
      operationId: updateUdhariEntry
      tags: [udhari]
      summary: Update an entry
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
        - in: path
          name: entryId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UdhariEntryUpdate"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UdhariEntryResponse"
    delete:
      operationId: deleteUdhariEntry
      tags: [udhari]
      summary: Delete an entry
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
        - in: path
          name: entryId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UdhariEntryResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # Auth
    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Username, email or mobile
        password:
          type: string

    AuthUser:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        mobile:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, operator, user]
        fullName:
          type: ["string", "null"]
        profilePicture:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        address:
          type: ["string", "null"]

    UserProfile:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        mobile:
          type: ["string", "null"]
        fullName:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, operator, user]
        profilePicture:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        createdAt:
          type: string

    UpdateProfileInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        mobile:
          type: string
        bio:
          type: string
        address:
          type: string
        password:
          type: string
        currentPassword:
          type: string

    AvatarInput:
      type: object
      required: [profilePicture]
      properties:
        profilePicture:
          type: string
          description: Base64 data URL (data:image/...;base64,...)

    AvatarResponse:
      type: object
      required: [profilePicture]
      properties:
        profilePicture:
          type: ["string", "null"]

    UserPreferences:
      type: object
      required: [theme, language, dashboardLayout]
      properties:
        theme:
          type: string
          enum: [light, dark]
        language:
          type: string
          enum: [en, hi, or]
        dashboardLayout:
          type: string
        updatedAt:
          type: string

    UpdatePreferencesInput:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark]
        language:
          type: string
          enum: [en, hi, or]
        dashboardLayout:
          type: string

    # Ledger
    LedgerEntry:
      type: object
      required: [id, date, customerName, serviceType, credit, debit, description, balance, createdBy, createdAt]
      properties:
        id:
          type: integer
        date:
          type: string
        customerName:
          type: string
        serviceType:
          type: string
        credit:
          type: number
        debit:
          type: number
        description:
          type: string
        balance:
          type: number
        createdBy:
          type: integer
        createdByName:
