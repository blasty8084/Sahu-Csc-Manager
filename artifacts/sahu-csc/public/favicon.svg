<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">

  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A3D91"/>
      <stop offset="100%" stop-color="#165DFF"/>
    </linearGradient>

    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A00"/>
      <stop offset="100%" stop-color="#FF5E00"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <style>
    .ring {
      fill: none;
      stroke-width: 12;
      stroke-dasharray: 1800;
      stroke-dashoffset: 1800;
      animation: drawRing 3s ease forwards;
    }

    .logo-group {
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      animation-delay: 1.2s;
    }

    .pulse {
      animation: pulse 2.5s infinite;
      transform-origin: center;
    }

    .float {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes drawRing {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
  </style>

  <!-- Outer Circle -->
  <circle
    cx="400"
    cy="400"
    r="330"
    class="ring"
    stroke="url(#gradBlue)"
  />

  <!-- Orange Arc -->
  <path
    d="M120 520 A300 300 0 0 0 680 520"
    fill="none"
    stroke="url(#gradOrange)"
    stroke-width="10"
    stroke-linecap="round"
    class="float"
  />

  <g class="logo-group">

    <!-- Monitor -->
    <rect
      x="280"
      y="180"
      width="240"
      height="150"
      rx="12"
      fill="url(#gradBlue)"
      filter="url(#shadow)"
    />

    <rect
      x="295"
      y="195"
      width="210"
      height="120"
      rx="8"
      fill="#ffffff"
    />

    <text
      x="400"
      y="275"
      font-family="Arial, sans-serif"
      font-size="70"
      font-weight="bold"
      text-anchor="middle"
      fill="#0A3D91">
      CSC
    </text>

    <!-- Stand -->
    <rect x="375" y="330" width="50" height="25" fill="#0A3D91"/>
    <rect x="340" y="355" width="120" height="12" rx="6" fill="#0A3D91"/>

    <!-- Human Icon -->
    <g class="pulse">
      <circle cx="250" cy="220" r="20" fill="#FF8A00"/>
      <path
        d="M220 285 Q250 220 280 285"
        fill="none"
        stroke="#FF8A00"
        stroke-width="14"
        stroke-linecap="round"
      />
    </g>

    <!-- SAHU -->
    <text
      x="400"
      y="470"
      font-family="Arial Black, Arial, sans-serif"
      font-size="110"
      font-weight="900"
      text-anchor="middle"
      fill="url(#gradBlue)">
      SAHU
    </text>

    <!-- CSC -->
    <text
      x="400"
      y="540"
      font-family="Arial Black, Arial, sans-serif"
      font-size="55"
      font-weight="900"
      text-anchor="middle"
      fill="url(#gradOrange)">
      CSC
    </text>

    <!-- Tagline -->
    <text
      x="400"
      y="610"
      font-family="Arial, sans-serif"
      font-size="24"
      text-anchor="middle"
      fill="#444">
      DIGITAL • GOVERNMENT • FINANCIAL SERVICES
    </text>

  </g>

</svg>